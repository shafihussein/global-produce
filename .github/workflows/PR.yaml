name: Auto PR

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-and-merge-pr:
    if: github.ref_name != 'main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update branch with latest main using branch-preferred conflict resolution
        run: |
          git fetch origin main "${GITHUB_REF_NAME}"
          git checkout "${GITHUB_REF_NAME}"
          BEFORE_SHA=$(git rev-parse HEAD)
          git merge origin/main -X ours --no-edit
          AFTER_SHA=$(git rev-parse HEAD)

          if [ "$BEFORE_SHA" != "$AFTER_SHA" ]; then
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Create or update pull request
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const title = `Auto PR: ${branch}`;
            const body = [
              `Automated pull request for branch \`${branch}\`.`,
              "",
              "This PR was created by `.github/workflows/PR.yaml`.",
              "If `main` conflicts with the branch, the branch version is kept before merge."
            ].join("\n");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
              base: "main"
            });

            let pr;
            if (existing.data.length > 0) {
              pr = existing.data[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body
              });
            } else {
              pr = (
                await github.rest.pulls.create({
                  owner,
                  repo,
                  base: "main",
                  head: branch,
                  title,
                  body
                })
              ).data;
            }

            core.setOutput("number", String(pr.number));

      - name: Merge pull request into main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --delete-branch
